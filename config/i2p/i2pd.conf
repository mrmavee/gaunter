# I2Pd Configuration File
# Documentation: https://i2pd.readthedocs.io/en/latest/user-guide/configuration/

datadir = /var/lib/i2pd
daemon = false
log = stdout
loglevel = info

port = 4567
ipv4 = true
ipv6 = false

bandwidth = 0
share = 30

floodfill = false

ntcp2.enabled = true
ntcp2.published = true
ntcp2.port = 4567

ssu2.enabled = true
ssu2.published = true
ssu2.port = 4567

nat = true

upnp.enabled = false
upnp.name = I2Pd_Gateway

limits.transittunnels = 100
limits.openfiles = 2048
limits.coresize = 0

http.enabled = true
http.address = 0.0.0.0
http.port = 7070
http.auth = false

httpproxy.enabled = false
socksproxy.enabled = false

[reseed]
verify = true
urls = https://reseed.i2p-projekt.de/,https://reseed.divested.dev/,https://reseed.stormycloud.org/,https://i2p.ghativega.in/
